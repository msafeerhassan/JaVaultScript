<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JaVaultScript</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="splashWall" class="splashOverlay">
      <div class="splashCard">
        <h2>Initialize Secure Session</h2>
        <p>Enter a master phrase to derive your local Encryption Key.</p>
        <form id="masterPhraseForm">
          <input
            type="password"
            id="masterPhraseInput"
            placeholder="Enter secure master Phrase"
            required
            minlength="8"
          />
          <button type="submit">Unlock Chat</button>
        </form>
      </div>
    </div>

    <div id="qrScanner" class="splashOverlay hidden">
      <div class="splashCard scannerCard">
        <h3>Scan Peer QR Code</h3>
        <p>Grant camera Access and align the QR Code within frame</p>
        <div class="videoWrapper">
          <video id="scannerVideo" playsinline></video>
        </div>
        <button id="closeScannerBtn" class="cancelBtn" type="button">Cancel Scanning</button>
      </div>
    </div>

    <main id="mainApp" class="hidden">
      <header>
        <div class="headerTitleContainer">
        <h1>JaVault Workspace</h1>
        <div class="statusContainer">
          <span id="statusRing" class="statusRing statusIdle"></span>
          <span id="statusText">Disconnected</span>
        </div>
        </div>
        <button id="lockBtn">Lock Session</button>
      </header>

      <section id="signalingGrid" class="signalingGrid">
        <div class="gridColum">
          <h3>Local Configuration</h3>
          <button id="genOfferBtn">1. Generate Connection Offer</button>
          <label for="localSdpTextArea">Your Local SDP (Copy this): </label>
          <textarea readonly placeholder="Click generate to create local connection offer...." id="localSdpTextArea"></textarea>
          <div class="qrContainer">
            <canvas id="localQrCanvas"></canvas>
          </div>
        </div>

        <div class="gridColum">
          <h3>Remote Connection Pair-Up</h3>
          <label for="remoteSdpTextArea">Paste Invite SDP Code here: </label>
          <textarea placeholder="Paste the remote SDP Offer here." id="remoteSdpTextArea"></textarea>
          <button id="scanRemoteQrBtn">Scan Remote QR Code via Camera</button>
          <button id="acceptRemoteBtn">2. Accept Remote Peer Connection Request</button>
        </div>
      </section>

      <div id="chatLog"></div>
      <form id="messageForm">
        <input type="file" class="hidden" id="fileInput">
        <input
          type="text"
          id="messageInput"
          placeholder="Type a message...."
          required
        />
        <button type="submit">Send</button>
      </form>
    </main>

    <script type="module" src="app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  </body>
</html>
